<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>
<style>
body {
font-family: Arial;
text-align: center;
background: #f2f2f2;
}
.container {
background: white;
width: 300px;
margin: auto;
padding: 20px;
margin-top: 100px;
border-radius: 10px;
}
input {
padding: 10px;
width: 70%;
}
button {
padding: 10px;
}
li {
text-align: left;
margin: 10px;
}
</style>
</head>
<body>

<div class="container">
<h2>My To Do List</h2>
<input type="text" id="task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>
</div>

<script>
function addTask(){
var task = document.getElementById("task").value;
var li = document.createElement("li");
li.innerText = task;
document.getElementById("list").appendChild(li);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px;
        }

        li {
            margin: 10px;
        }
        
        .done {
    text-decoration: line-through;
    color: gray;
}

span {
    cursor: pointer;
}
    </style>
</head>

<body>

<h2>Todo App</h2>

<input type="text" id="search" placeholder="Search task" onkeyup="searchTask()">

<input type="text" id="task">
<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function showTasks() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    tasks.forEach((t, i) => {
        list.innerHTML += `
        <li>
            <span class="${t.done ? 'done' : ''}" onclick="toggle(${i})">
                ${t.text}
            </span>
            <button onclick="editTask(${i})">✏️</button>
            <button onclick="deleteTask(${i})">❌</button>
        </li>`;
    });
}
     function editTask(i) {
    let newTask = prompt("Edit your task:", tasks[i].text);
    
    if (newTask !== null && newTask.trim() !== "") {
        tasks[i].text = newTask.trim();
        localStorage.setItem("tasks", JSON.stringify(tasks));
        showTasks();
    }
     }
    
    function toggle(i) {
    tasks[i].done = !tasks[i].done;
    localStorage.setItem("tasks", JSON.stringify(tasks));
    showTasks();
    }
    
function addTask() {
    let task = document.getElementById("task").value.trim();
    if (task === "") return;

    tasks.push({text: task, done: false});
    localStorage.setItem("tasks", JSON.stringify(tasks));

    document.getElementById("task").value = "";
    showTasks();
}

function deleteTask(i) {
    tasks.splice(i, 1);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    showTasks();
}

function searchTask() {
    let value = document.getElementById("search").value.toLowerCase();
    let list = document.getElementById("list").getElementsByTagName("li");

    for (let i = 0; i < list.length; i++) {
        let text = list[i].innerText.toLowerCase();
        list[i].style.display = text.includes(value) ? "" : "none";
    }
}    

showTasks();

</script>

</body>
</html>

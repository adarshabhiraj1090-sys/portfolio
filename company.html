<!DOCTYPE html>
<html>
<head>
    <title>My Company</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        .navbar {
            background: black;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        .navbar a:hover {
            color: yellow;
        }

        .section {
            padding: 100px 20px;
            text-align: center;
            background: white;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .section:hover {
            transform: scale(1.02);
            transition: 0.3s;
        }

        h1, h2 {
            color: black;
        }

        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: red;
        }

        img {
            margin-bottom: 10px;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .navbar a {
                display: block;
                margin: 10px 0;
                font-size: 16px;
            }

            .section {
                padding: 60px 10px;
                margin: 10px;
            }

            h1 {
                font-size: 24px;
            }

            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="#home">Home</a>

        <a href="#projects">Projects</a>

        <h1 id="title">Welcome to My Company</h1>
        <p>This is my business website.</p>
    </div>

    <!-- About -->
    <div id="about" class="section">
        <h2>About Us</h2>
        <p>We provide best services.</p>

    <!-- Projects -->

        <!-- Hire Me -->

        <!-- WhatsApp -->

            <button>Chat on WhatsApp</button>

<script>
function showName() {

<!DOCTYPE html>
<html>
<head>
    <title>My Company</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        .navbar {
            background: black;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        .navbar a:hover {
            color: yellow;
        }

        .section {
            padding: 120px 20px;
            text-align: center;
            background: white;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            transition: 0.3s;
        }

        .section:hover {
            transform: scale(1.02);
        }

        h1, h2 {
            color: black;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </div>

    <div id="home" class="section">
        <h1>Welcome to My Company</h1>
        <p>This is my business website.</p>
    </div>

    <div id="about" class="section">
        <h2>About Us</h2>
        <p>We provide best services.</p>
    </div>

    <div id="contact" class="section">
        <h2>Contact</h2>
        <p>Email: example@gmail.com</p>
    </div>

</body>
</html>

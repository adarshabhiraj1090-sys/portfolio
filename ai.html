<!DOCTYPE html>
<html>
<head>
<title>My AI Chat</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    margin: 0;
}

/* Header */
h1 {
    background: black;
    padding: 15px;
    margin: 0;
}

/* Chatbox */
#chatbox {
    width: 95%;
    max-width: 500px;
    margin: 20px auto;
    padding: 15px;
    height: 350px;
    overflow-y: auto;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
}

/* Messages */
.user {
    background: #00bcd4;
    padding: 8px 12px;
    border-radius: 15px;
    display: inline-block;
    margin: 5px;
    float: right;
    clear: both;
}

.bot {
    background: #444;
    padding: 8px 12px;
    border-radius: 15px;
    display: inline-block;
    margin: 5px;
    float: left;
    clear: both;
}
/* Input area */
.input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    padding: 10px;
}

/* Input box */
input {
    width: 60%;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

/* Buttons */
button {
    padding: 10px;
    border: none;
    border-radius: 50%;
    background: cyan;
    margin: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>🤖 Adarsh AI Assistant</h1>

<div id="chatbox"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Type message...">
    <button onclick="send()">➤</button>
    <button onclick="startVoice()">🎤</button>
    <button onclick="clearChat()">🗑️</button>
    <button onclick="startJarvis()">🤖 Jarvis</button>
</div>

<script>

 let isVoice = false;

// 🔹 Load chat
window.onload = function () {
    let saved = localStorage.getItem("chat");
    if (saved) {
        document.getElementById("chatbox").innerHTML = saved;
    }
};

// 🔹 Send message
function send(msgFromVoice = null) {

    let input = msgFromVoice || document.getElementById("userInput").value.trim();
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    document.getElementById("userInput").value = "";

    // Typing animation
    chatbox.innerHTML += `<div class="bot" id="typing">🤖 Typing...</div>`;
    scrollDown();

    setTimeout(() => {

        document.getElementById("typing").remove();

        let reply = getReply(input);

        chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

        if (isVoice) {
    speak(reply);
    isVoice = false;
        }

        localStorage.setItem("chat", chatbox.innerHTML);

        scrollDown();

    }, 700);
}

// 🔹 Reply logic
function getReply(msg) {
    msg = msg.toLowerCase();

    let replies = {
        "hello": ["Hello 👋 Kaise ho?", "Hi 😄 Kya haal hai?", "Hey! 👋"],
        "hi": ["Hi 😄", "Hello 👋", "Hey bro 😎"],
        "how are you": ["Main mast hu 😎 Tum batao?", "Sab badhiya 👍"],
        "kaise ho": ["Main mast hu 😎 Tum batao?", "Badiya hu 😄"],
        "who made you": [
    "Mujhe Adarsh ne banaya hai 😎🔥",
    "Adarsh is my creator 😎",
    "Main Adarsh ka AI assistant hu 🤖"
],
        "tum kon ho": ["Main tumhara AI assistant hu 🤖"],
        "help": ["Main coding, basic questions me help kar sakta hu 💻"]
    };

    for (let key in replies) {
        if (msg.includes(key)) {
            let arr = replies[key];
            return arr[Math.floor(Math.random() * arr.length)];
        }
    }

    let defaultReplies = [
        "🤔 Thoda aur clearly pucho",
        "😅 Samajh nahi aaya",
        "👀 Interesting hai, aur batao",
        "😎 Ye thoda tough hai"
    ];

    return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
}

// 🔹 Voice input (MAIN FIX)
function startVoice() {

    isVoice = true;
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-IN";
    recognition.start();

    recognition.onstart = function () {
        alert("🎤 Listening...");
    };

    recognition.onresult = function (event) {
        let voiceText = event.results[0][0].transcript;
        send(voiceText); // 👈 direct send
    };

    recognition.onerror = function () {
        alert("Voice error 😢 Try again");
    };
}

// 🔹 Voice output
function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    window.speechSynthesis.speak(speech);
}

// 🔹 Clear chat
function clearChat() {
    localStorage.removeItem("chat");
    document.getElementById("chatbox").innerHTML = "";
}

// 🔹 Enter key
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// 🔹 Scroll
function scrollDown() {
    let chatbox = document.getElementById("chatbox");
    chatbox.scrollTo({
        top: chatbox.scrollHeight,
        behavior: "smooth"
    });
}
function startJarvis() {

    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US"; // या hi-IN
    recognition.continuous = true;

    recognition.onresult = function(event) {
        let last = event.results.length - 1;
        let text = event.results[last][0].transcript;

        document.getElementById("userInput").value = text;

        send(); // auto send
    };

    recognition.start();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Adarsh AI Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        #chatbox {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .user { color: cyan; margin: 5px; }
        .bot { color: yellow; margin: 5px; }

        input {
            padding: 10px;
            width: 60%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>

<body>

<h1>🤖 Adarsh AI Assistant</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Ask me anything...">
<button onclick="send()">Send</button>
<button onclick="clearChat()">Clear Chat</button>
<button onclick="toggleVoice()">🔊 Speak</button>

<script>

// 🔹 Load saved chat
window.onload = function () {
    let saved = localStorage.getItem("chat");
    if (saved) {
        document.getElementById("chatbox").innerHTML = saved;
    }
};

// 🔹 Send message
function send() {
    let input = document.getElementById("userInput").value.trim();
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    document.getElementById("userInput").value = "";

    // Typing animation
    chatbox.innerHTML += `<div class="bot" id="typing">⏳ Bot is typing...</div>`;
    scrollDown();

    setTimeout(() => {
        document.getElementById("typing").remove();

        let reply = getReply(input);

        chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

        // Speak if enabled
        if (voiceOn) speak(reply);

        // Save chat
        localStorage.setItem("chat", chatbox.innerHTML);

        scrollDown();

    }, 800);
}

// 🔹 Smart reply system
function getReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Kaise ho?";

    if (msg.includes("kaise ho") || msg.includes("how are you"))
        return "Main mast hu 😎 Tum batao?";

    if (msg.includes("who made you") || msg.includes("kisne banaya"))
        return "Mujhe Adarsh ne banaya hai 😎🔥";

    if (msg.includes("tum kon ho"))
        return "Main tumhara AI assistant hu 🤖";

    // Random replies
    let replies = [
        "🤔 Thoda aur clearly pucho",
        "😅 Samajh nahi aaya",
        "👀 Interesting hai, aur batao",
        "😎 Ye thoda tough hai"
    ];

    return replies[Math.floor(Math.random() * replies.length)];
}

// 🔹 Clear chat
function clearChat() {
    localStorage.removeItem("chat");
    document.getElementById("chatbox").innerHTML = "";
}

// 🔹 Enter key support
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// 🔹 Smooth scroll
function scrollDown() {
    let chatbox = document.getElementById("chatbox");
    chatbox.scrollTo({
        top: chatbox.scrollHeight,
        behavior: "smooth"
    });
}

// 🔹 Voice system
let voiceOn = false;

function toggleVoice() {
    voiceOn = !voiceOn;
    alert(voiceOn ? "Voice ON 🔊" : "Voice OFF 🔇");
}

function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        #chatbox {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .user {
            color: cyan;
            margin: 5px;
        }

        .bot {
            color: yellow;
            margin: 5px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🤖 My AI Chat</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="send()">Send</button>

<script>
function send() {
    let input = document.getElementById("userInput").value;
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    // User message
    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    let reply = getReply(input);

    // Bot reply
    chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

    document.getElementById("userInput").value = "";
    chatbox.scrollTop = chatbox.scrollHeight;
}

// Smart replies
function getReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello")) return "Hi 👋 How can I help you?";
    if (msg.includes("how are you")) return "I am fine 😄 What about you?";
    if (msg.includes("your name")) return "I am your AI bot 🤖";
    if (msg.includes("help")) return "Sure! Tell me your problem 😊";
    if (msg.includes("bye")) return "Goodbye 👋 Have a nice day!";

    return "I am learning 😅 Please ask something else";
}
</script>
</body>
</html>

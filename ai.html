<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        #chatbox {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .user {
            color: cyan;
            margin: 5px;
        }

        .bot {
            color: yellow;
            margin: 5px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🤖 My AI Chat</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="send()">Send</button>

<script>
function send() {
    let input = document.getElementById("userInput").value;
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    let reply = getReply(input);

    chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

    document.getElementById("userInput").value = "";
    chatbox.scrollTop = chatbox.scrollHeight;
}

function getReply(msg) {
    msg = msg.toLowerCase();

    // Greetings
    if (msg.includes("hello") || msg.includes("hi")) 
        return "Hello 👋 How can I help you?";

    // Help
    if (msg.includes("help")) 
        return "I can help with basic questions 😊";

    // About
    if (msg.includes("your name")) 
        return "I am your AI assistant 🤖";

    // Coding
    if (msg.includes("html")) 
        return "HTML is used to create websites 🧑‍💻";

    if (msg.includes("css")) 
        return "CSS is used to style websites 🎨";

    if (msg.includes("javascript")) 
        return "JavaScript makes websites interactive ⚡";

    // Fun
    if (msg.includes("joke")) 
        return "😂 Why do programmers hate bugs? Because they bug them!";

    // Default smart reply
    return "🤖 I'm still learning... try asking about coding, hello, help, joke etc.";
}
</script>
</body>
</html>

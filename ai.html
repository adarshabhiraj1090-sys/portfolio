<!DOCTYPE html>
<html>
<head>
<title>My AI Chat</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
}

#chatbox {
    width: 90%;
    max-width: 500px;
    margin: 20px auto;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    height: 300px;
    overflow-y: auto;
    text-align: left;
}

.user { color: cyan; margin: 5px; }
.bot { color: yellow; margin: 5px; }

input {
    padding: 10px;
    width: 55%;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: cyan;
    cursor: pointer;
    margin: 5px;
}
</style>
</head>

<body>

<h1>🤖 My AI Chat</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">

<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="clearChat()">Clear Chat</button>

<script>

// 🔹 Load chat
window.onload = function () {
    let saved = localStorage.getItem("chat");
    if (saved) {
        document.getElementById("chatbox").innerHTML = saved;
    }
};

// 🔹 Send message
function send(msgFromVoice = null) {

    let input = msgFromVoice || document.getElementById("userInput").value.trim();
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    document.getElementById("userInput").value = "";

    // Typing animation
    chatbox.innerHTML += `<div class="bot" id="typing">⏳ Typing...</div>`;
    scrollDown();

    setTimeout(() => {

        document.getElementById("typing").remove();

        let reply = getReply(input);

        chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

        speak(reply); // 🔊 always speak

        localStorage.setItem("chat", chatbox.innerHTML);

        scrollDown();

    }, 700);
}

// 🔹 Reply logic
function getReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Kaise ho?";

    if (msg.includes("kaise ho") || msg.includes("how are you"))
        return "Main mast hu 😎 Tum batao?";

    if (msg.includes("tum kon ho"))
        return "Main tumhara AI chatbot hu 🤖";

    if (msg.includes("who made you") || msg.includes("kisne banaya"))
        return "Mujhe Adarsh ne banaya hai 😎🔥";

    let replies = [
        "🤔 Thoda aur clearly pucho",
        "😅 Samajh nahi aaya",
        "👀 Interesting hai, aur batao",
        "😎 Ye thoda tough hai"
    ];

    return replies[Math.floor(Math.random() * replies.length)];
}

// 🔹 Voice input (MAIN FIX)
function startVoice() {

    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-IN";
    recognition.start();

    recognition.onstart = function () {
        alert("🎤 Listening...");
    };

    recognition.onresult = function (event) {
        let voiceText = event.results[0][0].transcript;
        send(voiceText); // 👈 direct send
    };

    recognition.onerror = function () {
        alert("Voice error 😢 Try again");
    };
}

// 🔹 Voice output
function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    window.speechSynthesis.speak(speech);
}

// 🔹 Clear chat
function clearChat() {
    localStorage.removeItem("chat");
    document.getElementById("chatbox").innerHTML = "";
}

// 🔹 Enter key
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// 🔹 Scroll
function scrollDown() {
    let chatbox = document.getElementById("chatbox");
    chatbox.scrollTo({
        top: chatbox.scrollHeight,
        behavior: "smooth"
    });
}

</script>

</body>
</html>

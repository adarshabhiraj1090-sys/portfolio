<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        #chatbox {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .user {
            color: cyan;
            margin: 5px;
        }

        .bot {
            color: yellow;
            margin: 5px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🤖 My AI Chat</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
<button onclick="clearChat()">Clear Chat</button>

<script>
 
let isVoice = false;

// 🔹 Load old chat on page load
window.onload = function () {
    let savedChat = localStorage.getItem("chat");
    if (savedChat) {
        document.getElementById("chatbox").innerHTML = savedChat;
    }
};

// 🔹 Send message
function send() {
    let input = document.getElementById("userInput").value;
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    // User message
    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    chatbox.innerHTML += `<div class="bot" id="typing">⏳ Typing...</div>`;

    document.getElementById("userInput").value = "";

    // 🔥 Typing animation show karo
    
    chatbox.scrollTop = chatbox.scrollHeight;

    // ⏳ Delay (1 second)
    setTimeout(() => {

        let reply = getReply(input);

        // Typing text hatao
        document.getElementById("typing").remove();

        // Real reply show karo
        chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;
        if (isVoice) {
           speak(reply);
           isVoice = false;
        }

        // Save chat
        localStorage.setItem("chat", chatbox.innerHTML);

        chatbox.scrollTop = chatbox.scrollHeight;

    }, 1000);
}

// 🔹 AI logic (same as before)
 function getReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Kaise ho?";

    if (msg.includes("how are you") || msg.includes("kaise ho"))
        return "Main mast hu 😎 Tum batao?";

    if (msg.includes("who are you") || msg.includes("tum kon ho"))
        return "Main tumhara AI chatbot hu 🤖";

    if (msg.includes("who made you") || msg.includes("kisne banaya"))
        return "Mujhe Adarsh ne banaya hai 😎🔥";

    if (msg.includes("kya kar rahe ho"))
        return "Main tumse baat kar raha hu 😄";

    if (msg.includes("thank"))
        return "Welcome 😊";

    return "🤖 Samajh nahi aaya 😅 thoda simple pucho";
 }
    
function clearChat() {
    localStorage.removeItem("chat");
    document.getElementById("chatbox").innerHTML = "";
 }

 document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

function startVoice() {
    isVoice = true;
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-IN"; // Hindi + English support

    recognition.start();

    recognition.onstart = function () {
        alert("🎤 बोलो...");
    };

    recognition.onresult = function (event) {
        let voiceText = event.results[0][0].transcript;

        // input box में text डालो
        document.getElementById("userInput").value = voiceText;

        // auto send
        send();
    };

    recognition.onerror = function () {
        alert("❌ Voice error, try again");
    };
}

 function speak(text) {
    let speech = new SpeechSynthesisUtterance();
    speech.text = text;
    speech.lang = "en-IN"; // Hindi + English support
    speech.rate = 1;

    window.speechSynthesis.speak(speech);
 }

</script>
</body>
</html>

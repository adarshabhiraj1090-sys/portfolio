<!DOCTYPE html>
<html>
<head>
<title>My AI Chat</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    margin: 0;
}

/* Header */
h1 {
    background: black;
    padding: 15px;
    margin: 0;
}

/* Chatbox */
#chatbox {
    width: 95%;
    max-width: 500px;
    margin: 20px auto;
    padding: 15px;
    height: 350px;
    overflow-y: auto;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
}

/* Messages */
.user {
    display: block;
    text-align: right;
    background: #00c6ff;
    color: black;
    padding: 8px;
    border-radius: 10px;
    margin: 5px;
    margin-left: auto;
    max-width: 70%;
}

.bot {
    display: block;
    text-align: left;
    background: #333;
    padding: 8px;
    border-radius: 10px;
    margin: 5px;
    margin-right: auto;
    max-width: 70%;
}
/* Input area */
.input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: black;
    padding: 10px;
}

/* Input box */
input {
    width: 60%;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

/* Buttons */
button {
    padding: 10px;
    border: none;
    border-radius: 50%;
    background: cyan;
    margin: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>🤖 Adarsh AI Assistant</h1>

<div id="chatbox"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Type message...">
    <button onclick="send()">➤</button>
    <button onclick="startVoice()">🎤</button>
    <button onclick="clearChat()">🗑️</button>
</div>

<script>

 let isVoice = false;

// 🔹 Load chat
window.onload = function () {
    let saved = localStorage.getItem("chat");
    if (saved) {
        document.getElementById("chatbox").innerHTML = saved;
    }
};

// 🔹 Send message
function send() {
    let input = document.getElementById("userInput").value;
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    let reply = getReply(input);

    chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

    
// 🔊 Voice reply
speak(reply);

    document.getElementById("userInput").value = "";

    chatbox.scrollTop = chatbox.scrollHeight;
}
// 🔹 Reply logic
function getReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Kaise ho?";

    if (msg.includes("kaise ho") || msg.includes("how are you"))
        return "Main mast hu 😎 Tum batao?";

    if (msg.includes("tum kon ho"))
        return "Main tumhara AI chatbot hu 🤖";

    if (msg.includes("who made you") || msg.includes("kisne banaya"))
        return "Mujhe Adarsh ne banaya hai 😎🔥";

    let replies = [
        "🤔 Thoda aur clearly pucho",
        "😅 Samajh nahi aaya",
        "👀 Interesting hai, aur batao",
        "😎 Ye thoda tough hai"
    ];

    return replies[Math.floor(Math.random() * replies.length)];
}

// 🔹 Voice input (MAIN FIX)
function startVoice() {

    isVoice = true;
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-IN";
    recognition.start();

    recognition.onstart = function () {
        alert("🎤 Listening...");
    };

    recognition.onresult = function (event) {
        let voiceText = event.results[0][0].transcript;
        send(voiceText); // 👈 direct send
    };

    recognition.onerror = function () {
        alert("Voice error 😢 Try again");
    };
}

// 🔹 Voice output
function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    window.speechSynthesis.speak(speech);
}

// 🔹 Clear chat
function clearChat() {
    localStorage.removeItem("chat");
    document.getElementById("chatbox").innerHTML = "";
}

// 🔹 Enter key
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// 🔹 Scroll
function scrollDown() {
    let chatbox = document.getElementById("chatbox");
    chatbox.scrollTo({
        top: chatbox.scrollHeight,
        behavior: "smooth"
    });
}

</script>

</body>
</html>

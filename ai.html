<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        #chatbox {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .user {
            color: cyan;
            margin: 5px;
        }

        .bot {
            color: yellow;
            margin: 5px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🤖 My AI Chat</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="send()">Send</button>

<script>
function send() {
    let input = document.getElementById("userInput").value;
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    let reply = getReply(input);

    chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

    document.getElementById("userInput").value = "";
    chatbox.scrollTop = chatbox.scrollHeight;
}

function getReply(msg) {
    msg = msg.toLowerCase();

    // greetings
    if (msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Kaise ho?";

    // how are you
    if (msg.includes("how are you") || msg.includes("kaise ho"))
        return "Main mast hu 😎 Tum batao?";

    // what happens / kya hota hai
    if (msg.includes("what happens") || msg.includes("kya hota"))
        return "Sab badhiya chal raha hai 😄 Tum kya jaan na chahte ho?";

    // who made you
    if (msg.includes("who made you") || msg.includes("kisne banaya"))
        return "Mujhe Adarsh ne banaya hai 😎🔥";

    // name
    if (msg.includes("your name") || msg.includes("tumhara naam"))
        return "Mera naam AI Bot hai 🤖";

    // help
    if (msg.includes("help"))
        return "Main basic questions ka answer de sakta hu 😊";

    // coding
    if (msg.includes("html"))
        return "HTML website ka structure banata hai 🧱";

    if (msg.includes("css"))
        return "CSS website ko stylish banata hai 🎨";

    if (msg.includes("javascript"))
        return "JavaScript website ko smart banata hai ⚡";

    // joke
    if (msg.includes("joke"))
        return "😂 Programmer ne code kyu toda? Kyuki usme bugs the!";

    // thanks
    if (msg.includes("thank"))
        return "Welcome 😄";

    // default smart reply
    return "🤖 Interesting question hai 😄 Thoda aur clearly pucho";
}
</script>
</body>
</html>

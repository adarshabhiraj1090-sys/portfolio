<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        #chatbox {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            text-align: left;
        }

        .user {
            color: cyan;
            margin: 5px;
        }

        .bot {
            color: yellow;
            margin: 5px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🤖 My AI Chat</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="send()">Send</button>
<button onclick="clearChat()">Clear Chat</button>

<script>

// 🔹 Load old chat on page load
window.onload = function () {
    let savedChat = localStorage.getItem("chat");
    if (savedChat) {
        document.getElementById("chatbox").innerHTML = savedChat;
    }
};

// 🔹 Send message
function send() {
    let input = document.getElementById("userInput").value;
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">You: ${input}</div>`;

    let reply = getReply(input);

    chatbox.innerHTML += `<div class="bot">Bot: ${reply}</div>`;

    document.getElementById("userInput").value = "";

    // 🔹 Save chat
    localStorage.setItem("chat", chatbox.innerHTML);

    chatbox.scrollTop = chatbox.scrollHeight;
}

// 🔹 AI logic (same as before)
 function getReply(msg) {
    msg = msg.toLowerCase();

    if (msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Kaise ho?";

    if (msg.includes("how are you") || msg.includes("kaise ho"))
        return "Main mast hu 😎 Tum batao?";

    if (msg.includes("who are you") || msg.includes("tum kon ho"))
        return "Main tumhara AI chatbot hu 🤖";

    if (msg.includes("who made you") || msg.includes("kisne banaya"))
        return "Mujhe Adarsh ne banaya hai 😎🔥";

    if (msg.includes("kya kar rahe ho"))
        return "Main tumse baat kar raha hu 😄";

    if (msg.includes("thank"))
        return "Welcome 😊";

    return "🤖 Samajh nahi aaya 😅 thoda simple pucho";
 }
    
function clearChat() {
    localStorage.removeItem("chat");
    document.getElementById("chatbox").innerHTML = "";
 }

 document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

</script>
</body>
</html>

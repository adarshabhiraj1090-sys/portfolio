<!DOCTYPE html>
<html>
<head>
  <title>Number Guess Game</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #222;
      color: white;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: orange;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🎮 Number Guess Game</h1>
  <p>Guess a number between 1 to 10</p>

  <input type="number" id="guess">
  <button onclick="checkGuess()">Check</button>
  <button onclick="resetGame()">Reset</button>

  <p id="result"></p>
  <p id="attempts"></p>

  <script>
    let randomNumber = Math.floor(Math.random() * 10) + 1;
    let count = 0;

    function checkGuess() {
      if (count >= 5) {
  document.getElementById("result").innerText = "💀 Game Over! Press Reset";
  return;
      }
      let userGuess = document.getElementById("guess").value;
      count++;

      if (userGuess == randomNumber) {
        document.getElementById("result").innerText = "🎉 Correct!";
      } else if (userGuess > randomNumber) {
        document.getElementById("result").innerText = "📉 Too High!";
      } else {
        document.getElementById("result").innerText = "📈 Too Low!";
      }

      document.getElementById("attempts").innerText = "Attempts: " + count;
    }

    if (count >= 5 && userGuess != randomNumber) {
  document.getElementById("result").innerText = "💀 Game Over!";
    }

    function resetGame() {
      randomNumber = Math.floor(Math.random() * 10) + 1;
      count = 0;
      document.getElementById("result").innerText = "";
      document.getElementById("attempts").innerText = "";
      document.getElementById("guess").value = "";
    }
  </script>

</body>
</html>

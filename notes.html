<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            margin: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
        }

        .note {
            margin: 10px auto;
            padding: 15px;
            width: 80%;
            border-radius: 10px;
            color: black;
        }

        .note button {
            background: red;
            color: white;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>📝 Notes App</h1>

<input type="text" id="noteInput" placeholder="Write a note...">
<input type="color" id="colorPicker">
<br>

<button onclick="addNote()">Add Note</button>
<button onclick="clearAll()">Clear All</button>

<br><br>

<input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">

<div id="notesContainer"></div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

// Show Notes
function showNotes() {
    let output = "";

    notes.forEach((note, index) => {
        output += `
        <div class="note" style="background:${note.color}">
            <span onclick="editNote(${index})">${note.text}</span><br>
            <small>${note.date}</small><br>
            <button onclick="deleteNote(${index})">Delete</button>
        </div>
        `;
    });

    document.getElementById("notesContainer").innerHTML = output;
}

// Add Note
function addNote() {
    let input = document.getElementById("noteInput").value;
    let color = document.getElementById("colorPicker").value;

    if (input === "") return;

    let newNote = {
        text: input,
        date: new Date().toLocaleString(),
        color: color
    };

    notes.push(newNote);

    localStorage.setItem("notes", JSON.stringify(notes));

    document.getElementById("noteInput").value = "";

    showNotes();
}

// Delete
function deleteNote(index) {
    notes.splice(index, 1);
    localStorage.setItem("notes", JSON.stringify(notes));
    showNotes();
}

// Edit
function editNote(index) {
    let newText = prompt("Edit note:", notes[index].text);

    if (newText !== null && newText !== "") {
        notes[index].text = newText;
        localStorage.setItem("notes", JSON.stringify(notes));
        showNotes();
    }
}

// Search
function searchNotes() {
    let input = document.getElementById("search").value.toLowerCase();
    let notesDiv = document.getElementsByClassName("note");

    for (let i = 0; i < notesDiv.length; i++) {
        let text = notesDiv[i].innerText.toLowerCase();

        notesDiv[i].style.display = text.includes(input) ? "block" : "none";
    }
}

// Clear All
function clearAll() {
    notes = [];
    localStorage.removeItem("notes");
    showNotes();
}

// Load on start
showNotes();
</script>

</body>
</html>

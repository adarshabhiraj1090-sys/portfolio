<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            margin: 10px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: cyan;
            cursor: pointer;
        }

        .note {
            background: rgba(255,255,255,0.2);
            margin: 10px auto;
            padding: 15px;
            width: 80%;
            border-radius: 10px;
        }

        .note button {
            background: red;
            color: white;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>📝 Notes App</h1>

<input type="text" id="noteInput" placeholder="Write a note...">
<br>
<button onclick="addNote()">Add Note</button>

<div id="notesContainer"></div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

// Show Notes
function showNotes() {
    let output = "";

    notes.forEach((note, index) => {
        output += `
        <div class="note">
            <p>${note.text}</p>
            <small>${note.date}</small><br>
            <button onclick="deleteNote(${index})">Delete</button>
        </div>
        `;
    });

    document.getElementById("notesContainer").innerHTML = output;
}

// Add Note
function addNote() {
    let input = document.getElementById("noteInput").value;

    if (input === "") return;

    let newNote = {
        text: input,
        date: new Date().toLocaleString()
    };

    notes.push(newNote);

    localStorage.setItem("notes", JSON.stringify(notes));

    document.getElementById("noteInput").value = "";

    showNotes();
}

// Delete Note
function deleteNote(index) {
    notes.splice(index, 1);

    localStorage.setItem("notes", JSON.stringify(notes));

    showNotes();
}

// Load notes on start
showNotes();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin: 0;
        }

        .container {
            margin-top: 50px;
        }

        input {
            padding: 10px;
            width: 60%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: cyan;
            color: black;
            border-radius: 8px;
            cursor: pointer;
        }

        .note {
            background: rgba(255,255,255,0.2);
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
        }

        .delete {
            background: red;
            color: white;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📝 Notes App</h1>

    <input type="color" id="colorPicker">
    <input type="text" id="noteInput" placeholder="Write a note...">
    <br><br>
<input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">
<br><br>
    <button onclick="clearAll()">Clear All</button>
    <button onclick="addNote()">Add</button>

    <div id="notes"></div>
</div>

<script>
    // Load notes on page load
    window.onload = function() {
        let savedNotes = localStorage.getItem("notes");
        if (savedNotes) {
            document.getElementById("notes").innerHTML = savedNotes;
        }
    };

    function addNote() {
        let color = document.getElementById("colorPicker").value;
        let input = document.getElementById("noteInput");
        let text = input.value;

        if (text === "") return;

        let noteDiv = document.createElement("div");
        noteDiv.className = "note";
        noteDiv.style.background = color;

        noteDiv.innerHTML = `
            ${text}
            <br>
            <button class="delete" onclick="deleteNote(this)">Delete</button>
        `;

        document.getElementById("notes").appendChild(noteDiv);

        saveNotes();
        input.value = "";
    }

    function deleteNote(btn) {
        btn.parentElement.remove();
        saveNotes();
    }

    function saveNotes() {
        let notesHTML = document.getElementById("notes").innerHTML;
        localStorage.setItem("notes", notesHTML);
    }

    function searchNotes() {
    let input = document.getElementById("search").value.toLowerCase();
    let notes = document.getElementsByClassName("note");

    for (let i = 0; i < notes.length; i++) {
        let text = notes[i].innerText.toLowerCase();

        if (text.includes(input)) {
            notes[i].style.display = "block";
        } else {
            notes[i].style.display = "none";
        }
    }
}

function clearAll() {
    document.getElementById("notes").innerHTML = "";
    localStorage.removeItem("notes");
}
</script>

</body>
  </html>

<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
</head>

<body style="text-align:center; font-family:Arial; background:#667eea; color:white;">

<h1>📝 Notes App</h1>

<input id="noteInput" placeholder="Write note">
<button onclick="addNote()">Add</button>

<div id="notesContainer"></div>

<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

// Show notes
function showNotes() {
    let data = "";

    for (let i = 0; i < notes.length; i++) {
        data += `
        <div>
            ${notes[i]}
            <button onclick="deleteNote(${i})">Delete</button>
        </div>
        `;
    }

    document.getElementById("notesContainer").innerHTML = data;
}

// Add note
function addNote() {
    let input = document.getElementById("noteInput").value;

    if (input === "") {
        alert("Write something!");
        return;
    }

    notes.push(input);

    localStorage.setItem("notes", JSON.stringify(notes));

    document.getElementById("noteInput").value = "";

    showNotes();
}

// Delete note
function deleteNote(index) {
    notes.splice(index, 1);
    localStorage.setItem("notes", JSON.stringify(notes));
    showNotes();
}

// Load notes
showNotes();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
    body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(to right, #74ebd5, #ACB6E5);
        transition: 0.5s;
        overflow: hidden;
    }

    #weatherEffect {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
    }

    .rain {
        background: url('https://i.ibb.co/7QpKsCX/rain.gif');
        background-size: cover;
    }

    .sun {
        background: radial-gradient(circle, rgba(255,255,0,0.3), transparent);
    }

    .card {
        background: rgba(255, 255, 255, 0.3);
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
        text-align: center;
        width: 300px;
        z-index: 1;
    }

    input {
        padding: 10px;
        border-radius: 8px;
        border: none;
        margin: 10px;
        width: 80%;
    }

    button {
        padding: 10px 15px;
        border: none;
        background: blue;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }

    #forecast p {
        background: rgba(255,255,255,0.3);
        padding: 10px;
        border-radius: 12px;
        margin: 8px 0;
    }
    </style>
</head>

<body>

<div id="weatherEffect"></div>

<div class="card">
    <h1>🌦️ Weather App</h1>

    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Get Weather</button>

    <h2 id="result"></h2>
    <div id="forecast"></div>
</div>

<script>
document.getElementById("result").innerHTML = "⏳ Loading...";
document.getElementById("forecast").innerHTML = "";
async function getWeather() {
    let city = document.getElementById("city").value.trim();
    let apiKey = "12d5efc1b3d470e90a7f605476dd9c3c"; 

    let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

    let response = await fetch(url);
    let data = await response.json();

    if (data.cod == 200) {

        let weather = data.weather[0].main;
        let icon = "";

        let effect = document.getElementById("weatherEffect");
        effect.className = "";

        if (weather == "Clear") {
            icon = "☀️";
            document.body.style.background = "linear-gradient(to right, #fceabb, #f8b500)";
            effect.classList.add("sun");
        }
        else if (weather == "Clouds") {
            icon = "☁️";
            document.body.style.background = "linear-gradient(to right, #bdc3c7, #2c3e50)";
        }
        else if (weather == "Rain") {
            icon = "🌧️";
            document.body.style.background = "linear-gradient(to right, #4b6cb7, #182848)";
            effect.classList.add("rain");
        }
        else if (weather == "Haze") {
            icon = "🌁";
            document.body.style.background = "linear-gradient(to right, #a1c4fd, #c2e9fb)";
        }
        else if (weather == "Smoke") {
            icon = "🌫️";
            document.body.style.background = "linear-gradient(to right, #757f9a, #d7dde8)";
        }
        else {
            icon = "🌍";
            document.body.style.background = "linear-gradient(to right, #74ebd5, #ACB6E5)";
        }

        document.getElementById("result").innerHTML =
            `${icon} ${data.name} <br> 🌡️ Temp: ${data.main.temp}°C <br> ☁️ ${weather}`;

        // 🔥 5-Day Forecast
        let forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`;

        let forecastRes = await fetch(forecastUrl);
        let forecastData = await forecastRes.json();

        let forecastHTML = "<h3>5-Day Forecast</h3>";

        for (let i = 0; i < forecastData.list.length; i += 8) {
            let day = forecastData.list[i];

            forecastHTML += `
                <p>
                📅 ${day.dt_txt.split(" ")[0]} <br>
                🌡️ ${day.main.temp}°C <br>
                ☁️ ${day.weather[0].main}
                </p>
            `;
        }

        document.getElementById("forecast").innerHTML = forecastHTML;

    } else {
        document.getElementById("result").innerHTML = "❌ City not found";
        document.getElementById("forecast").innerHTML = "";
    }
}

// ⌨️ Enter key
document.getElementById("city").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        getWeather();
    }
});

// 📍 GPS Auto Location
function getLocationWeather() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async function(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            let apiKey = "12d5efc1b3d470e90a7f605476dd9c3c";

            let url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

            let response = await fetch(url);
            let data = await response.json();

            if (data.cod == 200) {
                document.getElementById("city").value = data.name;
                getWeather();
            }
        });
    }
}

window.onload = getLocationWeather;
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
      padding: 50px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    .box {
      margin-top: 20px;
      background: white;
      padding: 20px;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
  </style>
</head>
<body>

<h2>🌦️ Weather App</h2>

<input type="text" id="city" placeholder="City name enter karo">
<button onclick="getWeather()">Search</button>

<div class="box">
  <h3 id="name"></h3>
  <p id="temp"></p>
  <p id="desc"></p>
</div>

<script>
async function getWeather() {
  let city = document.getElementById("city").value;

  let apiKey = "12d5efc1b3d470e90a7f605476dd9c3c"; 
  let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

  let res = await fetch(url);
  let data = await res.json();

  document.getElementById("name").innerText = data.name;
  document.getElementById("temp").innerText = "Temp: " + data.main.temp + "°C";
  document.getElementById("desc").innerText = "Weather: " + data.weather[0].description;
}
</script>

</body>
</html>

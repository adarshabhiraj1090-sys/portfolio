<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    transition: 0.5s;
}

.card {
    background: rgba(255, 255, 255, 0.2);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    background: blue;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}
    </style>
    

</head>
<body>

<div class="card">
    <h1>🌦️ Weather App</h1>

    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Get Weather</button>

    <h2 id="result"></h2>
</div>

</body>

    <script>
        async function getWeather() {
            let city = document.getElementById("city").value.trim();

            let apiKey = "12d5efc1b3d470e90a7f605476dd9c3c";

            let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

            let response = await fetch(url);
            let data = await response.json();

            if (data.cod == 200) {

     let weather = data.weather[0].main;
let icon = "";

// 🌤️ Icon
if (weather == "Clear") {
    icon = "☀️";
    document.body.style.background = "linear-gradient(to right, #fceabb, #f8b500)";
}
else if (weather == "Clouds") {
    icon = "☁️";
    document.body.style.background = "linear-gradient(to right, #bdc3c7, #2c3e50)";
}
else if (weather == "Rain") {
    icon = "🌧️";
    document.body.style.background = "linear-gradient(to right, #4b6cb7, #182848)";
}
else if (weather == "Smoke") {
    icon = "🌫️";
    document.body.style.background = "linear-gradient(to right, #757f9a, #d7dde8)";
}
else {
    icon = "🌍";
    document.body.style.background = "linear-gradient(to right, #74ebd5, #ACB6E5)";
}

                document.getElementById("result").innerHTML =
                    `${icon} ${data.name} <br> 🌡️ Temp: ${data.main.temp}°C <br> ☁️ ${weather}`;

            } else {
                document.getElementById("result").innerHTML = "❌ City not found";
            }
        }

        // ⌨️ Enter key support
        document.getElementById("city").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                getWeather();
            }
        });
    </script>

</body>
</html>

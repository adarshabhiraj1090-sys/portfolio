<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .box {
      margin-top: 100px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background: orange;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🔐 Login</h1>

    <input type="text" id="username" placeholder=" username"><br>
    <input type="password" id="password" placeholder=" password"><br>

    <button onclick="login()">Login</button>

    <h3 id="result"></h3>
  </div>

  <script>
    function login() {
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;

      if (user === "admin" && pass === "1234") {
        document.getElementById("result").innerText = "✅ Welcome " + user;
      } else {
        document.getElementById("result").innerText = "❌ Wrong Username or Password";
      }
    }
  </script>

</body>
</html>
